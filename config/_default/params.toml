mainSections   = ["post"]
rssFullContent = true
favicon        = "https://www.bambooindustry.com/favicon.ico"

[footer]
    since = 2020

[sidebar]
    # emoji    = "✏️"
    subtitle = "Lorem ipsum dolor sit amet, consectetur adipiscing elit."
    avatar   = "https://www.bambooindustry.com/img/logo2026.png"

[article]
    [article.license]
        enabled = true
        default = "Licensed under [Bothbest Bamboo](https://www.bambooindustry.com)"

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 10 } },
    ]
    page     = [{ type = "toc" }]

[comments]
    # See complete configuration in config/_default/params.toml
    enabled  = true
    provider = "disqus"

# GDPR Cookie Consent Configuration
# When enabled, analytics and functional cookies require user consent
[cookies]
    enabled = false

    [cookies.categories]
        analytics  = true
        functional = true
